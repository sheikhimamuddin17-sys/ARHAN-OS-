<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARHAN OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f8fbff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:500px;
background:#fff;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

.logo{
width:120px;
height:120px;
border-radius:25px;
margin:auto;
margin-bottom:25px;
background:linear-gradient(135deg,#38bdf8,#2563eb);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:800;
color:white;
}

h1{
font-size:40px;
margin-bottom:10px;
color:#0f172a;
}

p{
color:#64748b;
line-height:1.8;
margin-bottom:30px;
}

a{
display:inline-block;
padding:16px 40px;
background:linear-gradient(135deg,#38bdf8,#2563eb);
color:white;
text-decoration:none;
border-radius:15px;
font-size:18px;
font-weight:700;
transition:.3s;
}

a:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">

<div class="logo">AS</div>

<h1>ARHAN OS</h1>

<p>
Welcome to the official ARHAN OS website.
Experience a fast, smart and powerful AI Assistant designed to make your daily tasks easier.
</p>

<a href="#">Download APK</a>

</div>

</body>
</html>
